baseURL = 'https://ramanbhalla.com/'
languageCode = "en-us"
title = "Connected-Boxes"
theme = "hugo-book"

# Hugo Book works best when it manages its own menus,
# but you can keep these for standard Hugo compatibility.
[pagination]
  pagerSize = 5

[params]
  # Basic Metadata
  author = "Raman Bhalla"
  description = "Dad | Learner | Advisor"

  # Hugo Book specific settings
  # Options: "light", "dark", "auto"
  BookTheme = "auto"

  # Enables the search functionality in the sidebar
  BookSearch = true

  # (Optional) Controls the width of the page content
  # BookSectionEnumerable = true

  # (Optional) Use this if you want to show 'Table of Contents' on the right
  BookToC = true

  # Set section to '*' to render all content in the sidebar menu
  BookSection = "*"

# Hugo Book usually generates the menu automatically from your
# content folder structure, but you can define manual links here.
[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3
