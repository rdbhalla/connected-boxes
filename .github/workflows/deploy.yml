name: Deploy Hugo to GitHub Pages

on:
  push:
    # Changed to 'main' - verify if your branch is master or main
    branches: [main, master] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Changed to recursive to ensure the theme submodule is fully pulled
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest' # Uses the most stable version
          extended: true

      - name: Build
        # Adding --gc to clean up old files and -v for better error logging
        run: hugo --minify --gc -v

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public